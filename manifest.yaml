version: 1

# Templates registry for `np package init`.
#
# Two orthogonal dimensions:
#   1. CATEGORY — what the plugin is (the problem it solves). First picker step.
#   2. SDK      — how it's implemented (runtime/language). Second picker step.
#
# `templates` is the sparse (category, sdk) matrix pointing at templates/<path>.
#
# Prompts (category `variables`) ask ONLY for what the scaffold can't derive:
# the human name (the slug is auto-derived from it). Everything else — scope
# category/provider, agent routing — is declared in code via the SDK
# (defineScope/defineService), the single source of truth, and changed there.

categories:
  - type: scope
    name: Deployment target
    description: Let the platform deploy apps to a new kind of infrastructure (Kubernetes, Lambda, ECS, bare metal, on-prem VMs…).
    variables:
      - name: Name
        prompt: Plugin name
        hint: "human-readable — e.g. 'Kubernetes K3D', 'AWS Lambda', 'ECS Fargate' (slug is auto-derived)"

  - type: simple
    name: Custom command handler
    description: Run code when the platform dispatches a command — health checks, migrations, notifications, data sync, anything the agent should execute on your behalf.
    variables:
      - name: Name
        prompt: Plugin name
        hint: "human-readable — e.g. 'DB Migrator', 'Slack Notifier', 'Secret Rotator' (slug is auto-derived)"

  - type: service
    name: Application dependency
    description: Wire up anything an application needs to run or operate — databases, caches, queues, load balancers, API gateways, observability (Datadog, Grafana, …), CDNs.
    variables:
      - name: Name
        prompt: Plugin name
        hint: "human-readable — e.g. 'Postgres', 'Redis', 'Datadog', 'CloudFront CDN' (slug is auto-derived)"

sdks:
  - id: bun
    name: Bun
    description: TypeScript with zero-config and first-class bundling. Fast dev iteration, single-file compiled binary via `bun build --compile` for production.

templates:
  - id: scope-bun
    path: bun/scope
    type: scope
    sdk: bun
    post_init:
      - "mise trust mise.toml"
      - "mise install"
    next_steps:
      - "cd {{ .Slug }}"
      - "np package test            # run tests"
      - "np package dev             # local dev with UI"
      - "np package dev --agent     # local dev with np-agent attached"
      - "np package publish         # build + push the worker image + sync with the platform"

  - id: simple-bun
    path: bun/simple
    type: simple
    sdk: bun
    post_init:
      - "mise trust mise.toml"
      - "mise install"
    next_steps:
      - "cd {{ .Slug }}"
      - "np package test            # run tests"
      - "np package dev             # local dev with hot reload"
      - "np package dev --agent     # local dev with np-agent attached"
      - "np package publish         # build + push the worker image"

  - id: service-bun
    path: bun/service
    type: service
    sdk: bun
    post_init:
      - "mise trust mise.toml"
      - "mise install"
    next_steps:
      - "cd {{ .Slug }}"
      - "np package test            # run tests"
      - "np package dev             # local dev with hot reload"
      - "np package dev --agent     # local dev with np-agent attached"
      - "np package publish         # build + push the worker image"
