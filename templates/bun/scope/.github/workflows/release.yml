name: release

# Publish this package to nullplatform when you cut a GitHub Release (or push a
# tag and publish it). This builds + pushes the lean worker image and registers
# the package version — the same `np package publish` you run locally.
#
# Configure once in the repo (Settings → Secrets and variables → Actions):
#   Secrets:   NP_API_KEY, REGISTRY_USERNAME, REGISTRY_PASSWORD
#   Variables: NP_PUSH_REGISTRY (e.g. ghcr.io/acme/myscope), NP_NRN
#
# Works with any registry you can `docker login` to (GHCR, ECR, Docker Hub, …).

on:
  release:
    types: [published]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # bun (and any other tools) come from mise.toml.
      - uses: jdx/mise-action@v2

      - name: Install np CLI
        run: |
          curl -fsSL https://cli.nullplatform.com/install.sh | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Log in to the container registry
        env:
          NP_PUSH_REGISTRY: ${{ vars.NP_PUSH_REGISTRY }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
        run: echo "$REGISTRY_PASSWORD" | docker login "${NP_PUSH_REGISTRY%%/*}" -u "$REGISTRY_USERNAME" --password-stdin

      - name: Publish package
        env:
          NP_API_KEY: ${{ secrets.NP_API_KEY }}
          NP_PUSH_REGISTRY: ${{ vars.NP_PUSH_REGISTRY }}
        run: np package publish --nrn "${{ vars.NP_NRN }}"
