[tools]
bun = "latest"
oras = "latest"

# Install runs on demand and is the root of the task dependency graph.
# Every other task declares `depends = ["install"]` so a fresh clone
# just works — no need to remember `mise install` before `mise run dev`.
[tasks.install]
description = "Install dependencies"
run = "bun install"
sources = ["package.json", "bun.lock"]

[tasks.test]
description = "Run tests"
depends = ["install"]
run = "bun run test"

[tasks.describe]
description = "Print plugin manifest"
depends = ["install"]
run = "bun run describe"

[tasks.build]
description = "Compile the plugin to a standalone executable"
depends = ["install"]
run = "bun run build"
sources = ["src/**/*.ts", "package.json", "bun.lock"]
outputs = ["dist/{{ .Slug }}"]

[tasks."build:all"]
description = "Cross-compile all release targets"
depends = ["install"]
run = """
bun build --compile --target=bun-linux-x64   ./src/index.ts --outfile dist/{{ .Slug }}-linux-x64
bun build --compile --target=bun-linux-arm64 ./src/index.ts --outfile dist/{{ .Slug }}-linux-arm64
bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile dist/{{ .Slug }}-darwin-arm64
"""

# `np plugin dev` → this task. For scope plugins the dev workflow is the
# form-based UI tester (plugin-dev-ui) which renders the plugin schema and
# lets you trigger actions interactively against test fixtures.
[tasks.dev]
description = "Run the plugin with the dev UI"
depends = ["install"]
run = "bun run dev"

# `np plugin dev --agent` → this task. Starts `np-agent` locally and
# points it at `./bin`, where the entrypoint shebang wrapper
# shells to `bun --hot src/index.ts`. Source edits hot-reload inside the
# same bun process, and the plugin SDK's gRPC server is idempotent
# across reloads — so np-agent's connection survives every save.
#
# Customize by swapping/extending the body: add docker deps via depends,
# override tags or API key via shell env, whatever fits your plugin.
# Requires `np-agent` on $PATH and NP_API_KEY in the environment.
[tasks."dev:agent"]
description = "Run the plugin in dev mode with np-agent attached"
depends = ["install"]
run = "bun run dev:agent"

# `np package run` → this task (when the template defines it): build the worker
# image and run it as a REAL local agent (docker, runtime=host). The np CLI
# passes NP_API_KEY / NP_LOCAL_USER / NP_LOG_LEVEL in the environment; this task
# owns everything else. No CLI-side docker logic — the template runs itself.
[tasks."build:image"]
description = "Build the worker container image (agent + this package)"
depends = ["install"]
run = """
set -euo pipefail
arch=$(uname -m)
if [ "$arch" = "arm64" ] || [ "$arch" = "aarch64" ]; then target=bun-linux-arm64-musl; else target=bun-linux-x64-musl; fi
bun build --compile --target=$target ./src/index.ts --outfile dist/{{ .Slug }}-worker
docker build -t {{ .Slug }}-worker:dev .
"""

[tasks.run]
description = "Run the worker image as a local agent (docker, no cluster)"
depends = ["build:image"]
run = """
set -euo pipefail
docker rm -f np-{{ .Slug }}-worker >/dev/null 2>&1 || true
docker run --rm --name np-{{ .Slug }}-worker \
  -e NP_API_KEY -e NP_LOG_LEVEL="${NP_LOG_LEVEL:-INFO}" \
  {{ .Slug }}-worker:dev \
  -runtime=host \
  -tags=package:{{ .Slug }},local:"${NP_LOCAL_USER:-$USER}" \
  -command-executor-command-folders=/app/packages/{{ .Slug }}
"""

# `np package publish` runs this (when --image is omitted): build the worker
# image, push it, and print registry/repo@sha256:<digest> on stdout for the CLI
# to register. Logs → stderr. Registry: $NP_PUSH_REGISTRY, else ttl.sh.
[tasks."publish:image"]
description = "Build + push the worker image; prints its digest ref"
run = "bash scripts/publish-image.sh"
