[tools]
bun = "latest"
oras = "latest"

# Install runs on demand and is the root of the task dependency graph.
# Every other task declares `depends = ["install"]` so a fresh clone
# just works — no need to remember `mise install` before `mise run dev`.
[tasks.install]
description = "Install dependencies"
run = "bun install"
sources = ["package.json", "bun.lock"]

[tasks.test]
description = "Run tests"
depends = ["install"]
run = "bun run test"

[tasks.describe]
description = "Print plugin manifest"
depends = ["install"]
run = "bun run describe"

[tasks.build]
description = "Compile the plugin to a standalone executable"
depends = ["install"]
run = "bun run build"
sources = ["src/**/*.ts", "package.json", "bun.lock"]
outputs = ["dist/{{ .Slug }}"]

[tasks."build:all"]
description = "Cross-compile all release targets"
depends = ["install"]
run = """
bun build --compile --target=bun-linux-x64   ./src/index.ts --outfile dist/{{ .Slug }}-linux-x64
bun build --compile --target=bun-linux-arm64 ./src/index.ts --outfile dist/{{ .Slug }}-linux-arm64
bun build --compile --target=bun-darwin-arm64 ./src/index.ts --outfile dist/{{ .Slug }}-darwin-arm64
"""

# `np plugin dev` → this task. Everyday dev workflow with hot reload.
# Uses `bun --hot` (not `--watch`) so module changes reload inside the
# same process — keeps the plugin SDK's idempotent startGrpcServer() in effect.
[tasks.dev]
description = "Run the plugin in dev mode"
depends = ["install"]
run = "bun run dev"

# `np plugin dev --agent` → this task. Starts `np-agent` locally and
# points it at `./bin`, where the entrypoint shebang wrapper
# shells to `bun --hot src/index.ts`. Source edits hot-reload inside the
# same bun process, and the plugin SDK's gRPC server is idempotent
# across reloads — so np-agent's connection survives every save.
#
# Customize by swapping/extending the body: add docker deps via depends,
# override tags or API key via shell env, whatever fits your plugin.
# Requires `np-agent` on $PATH and NP_API_KEY in the environment.
[tasks."dev:agent"]
description = "Run the plugin in dev mode with np-agent attached"
depends = ["install"]
run = "bun run dev:agent"

# Build the LEAN gRPC worker image (the image the agent spawns and dials over
# gRPC/mTLS). Just the compiled package binary on a minimal base — the agent
# injects the port + TLS + API key at runtime.
[tasks."build:image"]
description = "Build the lean gRPC worker image"
run = "docker build -t {{ .Slug }}-worker:dev ."

# `np package run` → run this package locally the way production does: a
# controlplane-agent with the worker orchestrator (docker backend) that SPAWNS
# the lean worker container and talks to it over gRPC/mTLS. Needs NP_API_KEY.
# --network host so the agent can reach the worker it publishes on the host
# (Linux; on Docker Desktop enable host networking). Override the agent image
# with NP_AGENT_IMAGE until the orchestrator agent is the default tag.
[tasks.run]
description = "Run locally: an agent (docker backend) that spawns the lean worker"
depends = ["build:image"]
run = """
set -eu
: "${NP_API_KEY:?set NP_API_KEY}"
docker rm -f np-{{ .Slug }}-agent >/dev/null 2>&1 || true
docker run --rm --name np-{{ .Slug }}-agent --network host \
  -v /var/run/docker.sock:/var/run/docker.sock \
  -e NP_API_KEY -e NP_LOG_LEVEL="${NP_LOG_LEVEL:-INFO}" \
  -e NP_WORKER_BACKEND=docker \
  -e NP_WORKER_IMAGE={{ .Slug }}-worker:dev \
  "${NP_AGENT_IMAGE:-public.ecr.aws/nullplatform/controlplane-agent:latest}" \
  -runtime=host -tags=package:{{ .Slug }},local:"${NP_LOCAL_USER:-$USER}"
"""

# `np package publish` runs this (when --image is omitted): build the lean worker
# image, push it to $NP_PUSH_REGISTRY (any registry you're `docker login`ed to),
# and print registry/repo@sha256:<digest> on stdout for the CLI to register.
[tasks."publish:image"]
description = "Build + push the lean worker image; prints its digest ref"
run = "bash scripts/publish-image.sh"
